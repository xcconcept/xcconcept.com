<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Team XC CONCEPT</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    :root {
      --pantone-530c: #B9AEDC;
      --pantone-2617c: #512B62;
      --pantone-3375c: #47D7AC;
      --pantone-663c: #F5F3F5;
    }
    body {
      margin: 0;
      background: var(--pantone-530c);
      font-family: 'Anton', Arial, sans-serif;
      color: var(--pantone-2617c);
    }
    .navbar {
      width: 100vw;
      box-sizing: border-box;
      padding: 0 40px;
      height: 64px;
      background: var(--pantone-663c);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--pantone-2617c);
      position: fixed;
      top: 0; left: 0;
      z-index: 999;
    }
    .navbar-home {
      display: flex;
      align-items: center;
      gap: 13px;
      text-decoration: none;
    }
    .navbar-logo {
      height: 38px;
      width: auto;
      display: block;
    }
    .logo {
      font-family: 'Anton', Arial, sans-serif;
      color: var(--pantone-2617c);
      font-size: 1.7rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: normal;
    }
    .navbar-links {
      display: flex;
      gap: 32px;
    }
    .navbar-links a {
      font-family: 'Anton', Arial, sans-serif;
      color: var(--pantone-2617c);
      font-size: 1.1rem;
      text-transform: uppercase;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 25px;
      background: none;
      border: 2px solid var(--pantone-2617c);
      margin-left: 4px;
      transition: color 0.18s, background 0.17s, border 0.19s;
    }
    .navbar-links a:hover {
      color: white;
      background: var(--pantone-3375c);
      border-color: var(--pantone-3375c);
    }
    .sections-container {
      padding-top: 76px; /* espace sous navbar */
    }
    .section {
      width: 100vw;
      height: 33vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .section-title {
      width: 100vw;
      font-family: 'Anton', Arial, sans-serif;
      font-size: 3vw;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--pantone-2617c);
      text-align: center;
      background: var(--pantone-663c);
      padding: 22px 0;
      /* Suppression border-radius, shadow et fond spécial */
    }
    .section-photo img {
      max-width: 80vw;
      max-height: 28vh;
      border-radius: 20px;
      box-shadow: 0 6px 36px #0002;
      object-fit: cover;
    }
    /* FOOTER CONTACT */
    .footer-contact {
      width: 100vw;
      background: var(--pantone-663c);
      color: var(--pantone-2617c);
      border-top: 2px solid var(--pantone-3375c);
      padding: 28px 0 19px 0;
      margin-top: 60px;
      font-family: 'Anton', Arial, sans-serif;
      box-sizing: border-box;
    }
    .footer-title {
      font-family: 'Anton', Arial, sans-serif;
      font-size: 1.42rem;
      font-weight: bold;
      letter-spacing: 0.07em;
      text-align: center;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .footer-columns {
      display: flex;
      justify-content: center;
      gap: 60px;
      flex-wrap: wrap;
      max-width: 900px;
      margin: 0 auto;
    }
    .footer-col {
      min-width: 230px;
      max-width: 380px;
      text-align: center;
      font-size: 1.12rem;
      margin: 6px 0;
    }
    .footer-label {
      font-family: 'Anton', Arial, sans-serif;
      font-weight: bold;
      margin-bottom: 4px;
      text-transform: uppercase;
      color: var(--pantone-3375c);
      font-size: 1.06rem;
    }
    .footer-col a {
      color: var(--pantone-2617c);
      text-decoration: underline;
      word-break: break-all;
      font-family: 'Anton', Arial, sans-serif;
    }
    .footer-col a:hover {
      color: var(--pantone-3375c);
    }
    @media (max-width: 700px) {
      .section-title { font-size: 1.2rem; padding: 10px 0; }
      .section-photo img { max-width: 98vw; max-height: 18vh;}
      .footer-columns { flex-direction: column; gap: 18px; }
      .footer-contact { font-size: 0.96rem; padding: 18px 0 8px 0; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-home">
      <img src="logo-xcconcept.png" alt="Logo XC Concept" class="navbar-logo">
      <span class="logo">XC CONCEPT</span>
    </a>
    <div class="navbar-links">
      <a href="qui-sommes-nous.html">Qui sommes-nous</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="sections-container">
    <section class="section section-title">
      Team XC CONCEPT
    </section>
    <section class="section section-photo">
      <img src="photo-accueil.jpg" alt="Team XC CONCEPT" />
    </section>
  </div>

  <footer class="footer-contact">
    <div class="footer-title">CONTACT</div>
    <div class="footer-columns">
      <div class="footer-col">
        <div class="footer-label">Adresse</div>
        24 impasse de la Muscadière<br>63119 Châteaugay, France
      </div>
      <div class="footer-col">
        <div class="footer-label">Email</div>
        <a href="mailto:bureau@xcconcept.com">bureau@xcconcept.com</a>
      </div>
    </div>
  </footer>
</body>
</html>
