<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Team XC CONCEPT</title>
  <!-- Police Anton -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    :root {
      --pantone-530c: #B9AEDC;     /* Fond principal */
      --pantone-2617c: #512B62;    /* Texte violet foncé */
      --pantone-3375c: #47D7AC;    /* Accents menthe */
      --pantone-663c: #F5F3F5;     /* Blanc/gris clair */
    }
    body {
      margin: 0;
      background: var(--pantone-530c);
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--pantone-2617c);
    }
    .navbar {
      width: 100vw;
      box-sizing: border-box;
      padding: 0 40px;
      height: 64px;
      background: var(--pantone-663c);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--pantone-2617c);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
    }
    .navbar-home {
      display: flex;
      align-items: center;
      gap: 13px;
      text-decoration: none;
    }
    .navbar-logo {
      height: 38px;
      width: auto;
      display: block;
    }
    .logo {
      font-family: 'Anton', Arial, sans-serif;
      color: var(--pantone-2617c);
      font-size: 1.7rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: normal;
      transition: color 0.2s;
    }
    .logo:hover {
      color: var(--pantone-3375c);
    }
    .navbar-links {
      display: flex;
      gap: 32px;
    }
    .navbar-links a {
      font-family: 'Anton', Arial, sans-serif;
      color: var(--pantone-2617c);
      font-size: 1.1rem;
      text-transform: uppercase;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 25px;
      background: none;
      border: 2px solid var(--pantone-2617c);
      margin-left: 4px;
      transition: 
        color 0.18s,
        background 0.17s,
        border 0.19s;
    }
    .navbar-links a:hover {
      color: white;
      background: var(--pantone-3375c);
      border-color: var(--pantone-3375c);
    }
    /* Mise en forme du contenu principal */
    .content {
      padding-top: 90px; /* Pour laisser place à la navbar */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
    }
    h1 {
      font-family: 'Anton', Arial, sans-serif;
      color: var(--pantone-2617c);
      font-size: 4vw;
      font-weight: normal;
      text-align: center;
      letter-spacing: 0.08em;
      margin: 0;
      text-transform: uppercase;
      background: var(--pantone-663c);
      border-radius: 12px;
      padding: 30px 55px;
      box-shadow: 0 0 20px 2px #0002;
    }
    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        height: auto;
        padding: 0 10px;
        gap: 4px;
      }
      .navbar-logo {
        height: 30px;
      }
      h1 {
        font-size: 2rem;
        padding: 12px 12px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-home">
      <img src="logo-xcconcept.png" alt="Logo XC Concept" class="navbar-logo">
      <span class="logo">XC CONCEPT</span>
    </a>
    <div class="navbar-links">
      <a href="qui-sommes-nous.html">Qui sommes-nous</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>
  <div class="content">
    <h1>Team XC CONCEPT</h1>
  </div>
</body>
</html>
